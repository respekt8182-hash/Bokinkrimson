<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Логотип Крым вокруг (компас без текста)">
  <defs>
    <style>
      :root { --ink:#3A2B23; --sea:#A76549; --sun:#F2C44D; --bg:#FAF8F5; }
      .bg { fill: var(--bg); }
      .ring { fill:none; stroke: rgba(58,43,35,.18); stroke-width: 10; }
      .stroke { fill:none; stroke: var(--ink); stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
      .accent { fill:none; stroke: var(--sea); stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
      .sun { fill: var(--sun); }
    </style>
    <marker id="arrow2" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#A76549"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="512" height="512" rx="96"/>
  <circle class="ring" cx="256" cy="256" r="160"/>
  <path class="accent" d="M128 256 A128 128 0 0 1 384 256" marker-end="url(#arrow2)"/>
  <path class="accent" d="M384 256 A128 128 0 0 1 128 256" opacity=".4"/>
  <path class="stroke" d="M256 144 L290 256 L256 368 L222 256 Z"/>
  <path class="stroke" d="M256 184 L272 256 L256 328 L240 256 Z" opacity=".25"/>
  <circle class="sun" cx="256" cy="256" r="12"/>
</svg>
